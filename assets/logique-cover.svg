<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">100% Logique cover</title>
  <desc id="desc">Quiz-show cover art for the 100% Logique project.</desc>
  <defs>
