<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">BoardShelf cover</title>
  <desc id="desc">Board-game library cover art for the BoardShelf project.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071a2a" />
      <stop offset="55%" stop-color="#0f365e" />
      <stop offset="100%" stop-color="#1786a9" />
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)" />
  <rect x="74" y="74" width="512" height="572" rx="30" fill="rgba(7, 15, 27, 0.72)" stroke="rgba(177, 231, 255, 0.22)" />
  <text x="120" y="192" fill="#98e3f6" font-size="34" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" letter-spacing="8">YOUR LIBRARY</text>
  <text x="120" y="296" fill="#edfaff" font-size="92" font-weight="700" font-family="'Trebuchet MS', 'Segoe UI', sans-serif">BoardShelf</text>
  <text x="120" y="378" fill="#c7f0fa" font-size="28" font-family="'Trebuchet MS', 'Segoe UI', sans-serif">Manage a collection, compare games, and ask the copilot.</text>
